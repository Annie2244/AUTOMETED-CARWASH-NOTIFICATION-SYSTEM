<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendant Dashboard | Carwash</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="dashboard-page attendant-dashboard sketch-app">
  <div class="grid-container">
    <header class="header">
      <button type="button" class="menu-icon" aria-label="Open navigation menu" aria-expanded="false">
        <span class="material-icons-outlined">menu</span>
      </button>
      <div class="header-left"><h2>Attendant Dashboard</h2></div>
      <div class="header-right">
        <span class="material-icons-outlined">notifications</span>
        <span class="material-icons-outlined">account_circle</span>
      </div>
    </header>

    <aside id="sidebar" class="sidebar" aria-label="Attendant navigation">
      <div class="sidebar-title">
        <div class="sidebar-brand"><span class="material-icons-outlined">local_car_wash</span> Carwash</div>
        <button type="button" class="close-sidebar" aria-label="Close navigation menu">
          <span class="material-icons-outlined">close</span>
        </button>
      </div>
      <ul class="sidebar-list">
        <li class="sidebar-list-item"><a class="active" href="#bookings"><span class="material-icons-outlined">event</span> Bookings</a></li>
        <li class="sidebar-list-item"><a href="#notification"><span class="material-icons-outlined">send</span> Notifications</a></li>
        <li class="sidebar-list-item"><a href="#payments"><span class="material-icons-outlined">payments</span> Payments</a></li>
      </ul>
    </aside>

    <main class="main-container">
      <div class="main-title">
        <p class="eyebrow">Daily service desk</p>
        <h2>Today’s Bookings</h2>
      </div>
      <section id="bookings" class="panel">
        <div class="panel-heading"><h3>Bookings</h3></div>
        <p>Sample booking list goes here.</p>
      </section>
    </main>
  </div>
  <script src="../js/script.js"></script>
</body>
</html>
