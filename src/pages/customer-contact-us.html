<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact us | Carwash</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="dashboard-page customer-dashboard sketch-app">
  <div class="grid-container">
    <header class="header">
      <button type="button" class="menu-icon" aria-label="Open navigation menu" aria-expanded="false">
        <span class="material-icons-outlined">menu</span>
      </button><a href="customer.html" class="back-button" aria-label="Back to dashboard"><span class="material-icons-outlined">arrow_back</span></a>
      <div class="header-left"><h2>Carwash Customer</h2></div>
      <div class="header-right">
        <span class="material-icons-outlined">notifications</span>
        <span class="material-icons-outlined">account_circle</span>
      </div>
    </header>

    <aside id="sidebar" class="sidebar" aria-label="Customer navigation">
      <div class="sidebar-title">
        <div class="sidebar-brand"><span class="material-icons-outlined">local_car_wash</span> Carwash</div>
        <button type="button" class="close-sidebar" aria-label="Close navigation menu">
          <span class="material-icons-outlined">close</span>
        </button>
      </div>
      <ul class="sidebar-list">
<li class="sidebar-list-item"><a href="customer.html"><span class="material-icons-outlined">calendar_month</span> Book a service</a></li>
<li class="sidebar-list-item"><a href="customer-my-bookings.html"><span class="material-icons-outlined">event_note</span> My bookings</a></li>
<li class="sidebar-list-item"><a href="customer-payments.html"><span class="material-icons-outlined">payments</span> Payments</a></li>
<li class="sidebar-list-item"><a href="customer-contact-us.html" class="active"><span class="material-icons-outlined">support_agent</span> Contact us</a></li>
<li class="sidebar-list-item"><a href="customer-profile.html"><span class="material-icons-outlined">account_circle</span> Profile</a></li>
<li class="sidebar-list-item sidebar-logout"><a href="index.html" data-action="logout"><span class="material-icons-outlined">logout</span> Logout</a></li>
</ul>
    </aside>

    <main class="main-container">

  <div class="main-title"><p class="eyebrow">Section</p><h2>CONTACT US</h2></div>
  <section class="panel">
    <div class="panel-heading"><h3>Send us a message</h3></div>
    <form class="demo-form">
      <div class="form-grid">
        <label>Name<input type="text" name="name" required></label>
        <label>Email<input type="email" name="email" required></label>
        <label>Subject<input type="text" name="subject" required></label>
      </div>
      <label>Message<textarea name="message" rows="4" required></textarea></label>
      <button type="submit" class="primary-action">Send message</button>
    </form>
    <a href="customer.html" class="landing-action">Back to dashboard</a>
  </section>
</main>
  </div>
  <script src="../js/script.js"></script>
</body>
</html>
